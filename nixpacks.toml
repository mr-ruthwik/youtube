[phases.setup]
aptPkgs = ["ffmpeg", "python3", "ca-certificates", "curl"]

[phases.build]
cmds = [
  "echo '[build] Downloading yt-dlp nightly binary (best bot-bypass patches)...'",
  "curl -fsSL https://github.com/yt-dlp/yt-dlp-nightly-builds/releases/latest/download/yt-dlp -o ./yt-dlp",
  "chmod a+rx ./yt-dlp",
  "echo '[build] yt-dlp version:' && ./yt-dlp --version",
  "echo '[build] Binary location:' && ls -lah ./yt-dlp"
]

[start]
cmd = "echo '[start] cwd:' && pwd && echo '[start] yt-dlp check:' && ls -lah ./yt-dlp && node server.js"