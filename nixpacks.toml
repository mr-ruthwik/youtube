[phases.setup]
aptPkgs = ["ffmpeg", "python3", "ca-certificates", "curl"]

[phases.build]
cmds = [
  "echo 'Build phase complete — yt-dlp will be downloaded at start'"
]

[start]
cmd = "curl -fsSL https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /app/yt-dlp && chmod a+rx /app/yt-dlp && echo '[nixpacks start] yt-dlp installed:' && /app/yt-dlp --version && node server.js"